name: MLOps Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'data/**.dvc'
      - 'src/**.py'
      - 'params.yaml'
  workflow_dispatch:

env:
  MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
  MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
  MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
  CLOUD_BUCKET: ${{ secrets.CLOUD_BUCKET }}

jobs:
  # ---------------------------------------------------------------------------
  # JOB 1 - UNIT TEST
  # ---------------------------------------------------------------------------
  test:
    name: Unit Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/ -v

  # ---------------------------------------------------------------------------
  # JOB 2 - TRAIN
  # ---------------------------------------------------------------------------
  train:
    name: Train
    needs: test
    runs-on: ubuntu-latest
    outputs:
      accuracy: ${{ steps.read_metrics.outputs.accuracy }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Authenticate to Cloud Storage
        run: |
          echo '${{ secrets.CLOUD_CREDENTIALS }}' > /tmp/sa-key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa-key.json" >> $GITHUB_ENV

      - name: Pull data with DVC
        run: |
          dvc pull data/train_phase1.csv.dvc data/eval.csv.dvc
          # Neu co du lieu moi tu Phase 2 (Continuous Training) thi gop vao
          if [ -f "data/train_phase2.csv.dvc" ]; then
            dvc pull data/train_phase2.csv.dvc
            python src/add_new_data.py
          fi

      - name: Train model
        run: python src/train.py

      - name: Read metrics
        id: read_metrics
        run: |
          ACC=$(python -c "import json; d=json.load(open('outputs/metrics.json')); print(d['accuracy'])")
          echo "accuracy=$ACC" >> $GITHUB_OUTPUT

      - name: Upload model and metrics to Cloud Storage
        run: |
          python - <<'EOF'
          import os
          from google.cloud import storage
          
          client = storage.Client()
          bucket = client.bucket(os.environ['CLOUD_BUCKET'])
          
          # Upload model
          blob_model = bucket.blob("models/latest/model.pkl")
          blob_model.upload_from_filename("models/model.pkl")
          
          # Upload metrics for Bonus 4 (Safe Deployment)
          blob_metrics = bucket.blob("models/latest/metrics.json")
          blob_metrics.upload_from_filename("outputs/metrics.json")
          
          print("Artifacts uploaded to GCS.")
          EOF

      - name: Save metrics as artifact
        uses: actions/upload-artifact@v4
        with:
          name: metrics
          path: outputs/metrics.json

  # ---------------------------------------------------------------------------
  # JOB 3 - EVAL (Safe Deployment - Bonus 4)
  # ---------------------------------------------------------------------------
  eval:
    name: Eval & Safe Deployment
    needs: train
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Cloud Storage
        run: |
          echo '${{ secrets.CLOUD_CREDENTIALS }}' > /tmp/sa-key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa-key.json" >> $GITHUB_ENV

      - name: Check eval gate and compare with current model
        run: |
          python - <<'EOF'
          import json
          import os
          from google.cloud import storage

          new_acc_str = "${{ needs.train.outputs.accuracy }}"
          if not new_acc_str:
              print("Error: No accuracy found from train job.")
              exit(1)
          
          new_acc = float(new_acc_str)
          
          # Threshold check
          if new_acc < 0.70:
              print(f"FAILED: New accuracy {new_acc:.4f} < 0.70 threshold.")
              exit(1)
          
          # Bonus 4: Compare with current model on GCS
          try:
              client = storage.Client()
              bucket = client.bucket(os.environ['CLOUD_BUCKET'])
              blob = bucket.blob("models/latest/metrics.json")
              
              if blob.exists():
                  content = blob.download_as_text()
                  current_metrics = json.loads(content)
                  current_acc = float(current_metrics.get("accuracy", 0))
                  
                  print(f"Current Accuracy (GCS): {current_acc:.4f}")
                  print(f"New Accuracy (Train): {new_acc:.4f}")
                  
                  if new_acc < current_acc:
                      print("WARNING: New model is worse than current model. Stopping deployment.")
                      exit(1)
                  else:
                      print("PASSED: New model is better or equal to current model.")
              else:
                  print("No current model found on GCS. First time deployment.")
          except Exception as e:
              print(f"Could not compare with current model: {e}. Proceeding with threshold check only.")

          print(f"FINAL PASSED: Accuracy {new_acc:.4f} satisfies all gates.")
          EOF

  # ---------------------------------------------------------------------------
  # JOB 4 - DEPLOY
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy
    needs: eval
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy to VM with Retries
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          # Bonus: SSH Retries & Hardening
          command_timeout: 10m
          max_uses: 3
          script: |
            echo "Starting deployment..."
            # Restart service
            sudo systemctl restart mlops-serve || (echo "Failed to restart service" && exit 1)
            
            # Health check with local retries
            echo "Waiting for health check..."
            for i in {1..5}; do
              if curl -sf http://localhost:8000/health; then
                echo "Health check passed!"
                exit 0
              fi
              echo "Health check failed, retrying in 5s ($i/5)..."
              sleep 5
            done
            
            echo "Health check failed after 5 attempts."
            exit 1
